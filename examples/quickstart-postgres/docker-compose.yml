services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-gdpr-quickstart-pg
    environment:
      POSTGRES_DB: gdpr
      POSTGRES_USER: gdpr
      POSTGRES_PASSWORD: gdpr
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdpr -d gdpr"]
      interval: 2s
      timeout: 2s
      retries: 30
