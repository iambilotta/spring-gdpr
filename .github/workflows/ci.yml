name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: set up jdk 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: build and test (incl. postgres IT via testcontainers)
        run: mvn -B -ntp -Dspring-gdpr.it=true verify

      - name: install starter to local repo for quickstart build
        run: mvn -B -ntp -DskipTests install

      - name: build quickstart example
        working-directory: examples/quickstart-postgres
        run: mvn -B -ntp test

      - name: assert dpia + ropa exist
        run: |
          test -f spring-gdpr-starter-test/target/generated-sources/annotations/spring/gdpr/ropa.csv
          test -f spring-gdpr-starter-test/target/generated-sources/annotations/spring/gdpr/dpia.md

      - name: upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spring-gdpr-evidence
          path: spring-gdpr-starter-test/target/generated-sources/annotations/spring/gdpr/
          if-no-files-found: warn

      - name: upload jacoco aggregate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-jacoco-aggregate
          path: spring-gdpr-starter-test/target/site/jacoco-aggregate/
          if-no-files-found: warn

      - name: generate coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: spring-gdpr-starter-test/target/site/jacoco-aggregate/jacoco.csv
          coverage-badge-filename: jacoco.svg
          generate-coverage-badge: true
          badges-directory: .github/badges

  # Living requirements (tracegate dogfood): the committed `*/_generated/`
  # catalog is derived from the test suite; this gate fails if it drifts from
  # the code. Additive and independent of the Java build. To fix a drift,
  # regenerate locally (`make requirements`) and commit — never hand-edit a
  # `_generated/*` file. tracegate is pinned to a commit so the gate is stable.
  tracegate:
    name: tracegate drift-gate
    runs-on: ubuntu-latest
    env:
      # Single source of the pin: the Makefile's TRACEGATE_REF. CI runs the SAME pinned uvx
      # invocation as the local hooks (uvx --from git+...@TRACEGATE_REF tracegate), so a stale
      # PATH install can never make local and CI disagree.
      TRACEGATE_REF: 3bb94964f1e0502d2e68681611bf5ac335180f4b
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - name: Drift-gate the requirements catalog (pinned tracegate via uvx)
        run: uvx --from "git+https://github.com/iambilotta/tracegate@${TRACEGATE_REF}" tracegate . --check
